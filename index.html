  <!-- 脚本 -->
  <script src="js/siteConfig.js"></script>
  <script src="js/wordData.js"></script>
  <script>
    // 首页动画演示
    (function() {
      try {
        const demoCard = document.getElementById('demoCard');
        const demoRoot = document.getElementById('demoRoot');
        const demoMeaning = document.getElementById('demoMeaning');

        if (!demoCard || !demoRoot || !demoMeaning || typeof WordRoots === 'undefined') {
          return;
        }

        // 取前5个野菜用于演示
        const demoItems = WordRoots.slice(0, 5);
        let currentIndex = 0;

        function showNext() {
          const item = demoItems[currentIndex];

          // 淡出
          demoCard.style.opacity = '0';

          setTimeout(() => {
            // 更新内容
            if (demoRoot && demoMeaning) {
              demoRoot.textContent = item.root;
              demoMeaning.textContent = item.meaning;
            }

            // 淡入
            demoCard.style.opacity = '1';

            // 下一个
            currentIndex = (currentIndex + 1) % demoItems.length;
          }, 300);
        }

        // 初始显示
        if (demoItems.length > 0) {
          demoRoot.textContent = demoItems[0].root;
          demoMeaning.textContent = demoItems[0].meaning;
          currentIndex = 1;
        }

        // 每3秒切换
        setInterval(showNext, 3000);
      } catch (error) {
        console.error('Demo animation error:', error);
      }
    })();
  </script>
